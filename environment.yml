# environment.yml
# Conda environment for DENV in silico genomic mutation analysis
# Create: conda env create -f environment.yml
# Activate: conda activate denv-analysis

name: denv-analysis

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10
  - biopython>=1.81
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - openpyxl>=3.1.0
  - xlsxwriter>=3.1.0
  - tabulate>=0.9.0
  - tqdm>=4.65.0
  - colorama>=0.4.6
  - requests>=2.31.0
  - pip:
    - plotly>=5.15.0
